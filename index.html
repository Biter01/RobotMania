<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Art Shooter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        cursor: default;
      }

      body.locked #game-canvas {
        cursor: none;
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: 'Courier New', monospace;
        color: #fff;
      }

      #fps {
        position: absolute;
        top: 12px;
        left: 12px;
        font-size: 0.85rem;
        color: #fff;
        text-shadow: 1px 1px 2px #000;
      }

      #menu-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        font-family: 'Courier New', monospace;
        z-index: 100;
      }

      #menu-overlay h1 {
        font-size: 3rem;
        letter-spacing: 8px;
        color: #e00;
        text-shadow: 4px 4px 0 #800;
        margin-bottom: 2rem;
        image-rendering: pixelated;
      }

      #menu-overlay p {
        font-size: 1rem;
        letter-spacing: 2px;
        animation: blink 1s step-end infinite;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <span id="fps"></span>
    </div>
    <div id="menu-overlay">
      <h1>ROBOT MANIA</h1>
      <p>[ CLICK ]</p>
    </div>
    <script type="module" src="/src/main.ts"></script> 
  </body>
</html>
